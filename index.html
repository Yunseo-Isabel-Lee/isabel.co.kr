
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yunseo Isabel Lee</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Playfair+Display:ital,wght@0,500;0,600;1,500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f7f3fb;
      --ink: #2e2440;
      --muted: #8a7ca8;
      --accent: #7c4dff;
      --accent-soft: #b39ddb;
      --line: #e6dcf5;
      --card: #ffffff;
    }
    * { box-sizing: border-box; }
    body {
      font-family: "Gowun Batang", "Noto Serif KR", serif;
      max-width: 860px;
      margin: 0 auto;
      padding: 72px 24px 96px;
      color: var(--ink);
      line-height: 1.75;
      background:
        radial-gradient(1200px 600px at 50% -200px, #efe6fb 0%, rgba(239,230,251,0) 70%),
        var(--bg);
      min-height: 100vh;
    }
    .header {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 32px;
      margin-bottom: 56px;
    }
    .avatar {
      flex: 0 0 auto;
      width: 200px;
      height: 270px;
      border-radius: 50%;
      object-fit: cover;
      object-position: center 22%;
      border: 4px solid #fff;
      box-shadow: 0 14px 38px rgba(74, 58, 107, 0.28),
                  0 0 0 3px #4a3a6b;
    }
    .header-text { min-width: 0; }
    h1 {
      font-family: "Playfair Display", "Gowun Batang", serif;
      font-size: 3.15rem;
      font-weight: 600;
      letter-spacing: 0.01em;
      margin: 0 0 8px;
      color: #4a3a6b;
      white-space: nowrap;
    }
    .subtitle {
      color: var(--muted);
      font-size: 1.53rem;
      margin: 0;
      white-space: nowrap;
    }
    .section-title {
      font-family: "Playfair Display", serif;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      color: var(--accent-soft);
      margin: 0 0 18px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--line);
    }
    a.work {
      position: relative;
      display: block;
      padding: 18px 22px;
      margin-bottom: 12px;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      text-decoration: none;
      color: var(--ink);
      font-size: 1.05rem;
      transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
    }
    a.work::before {
      content: "";
      position: absolute;
      left: 0; top: 14px; bottom: 14px;
      width: 3px;
      border-radius: 3px;
      background: var(--accent);
      opacity: 0;
      transition: opacity 0.18s ease;
    }
    a.work:hover {
      transform: translateY(-2px);
      border-color: var(--accent-soft);
      box-shadow: 0 10px 28px rgba(124, 77, 255, 0.14);
    }
    a.work:hover::before { opacity: 1; }
    @media (max-width: 480px) {
      body { padding: 48px 18px 72px; }
      .header { flex-direction: column; align-items: flex-start; gap: 18px; }
      .avatar { width: 170px; height: 230px; }
      h1 { font-size: 2.5rem; white-space: normal; }
      .subtitle { font-size: 1.3rem; white-space: normal; }
    }
  </style>
</head>
<body>
  <div class="header">
    <img class="avatar" src="profile.jpg" alt="Yunseo Isabel Lee">
    <div class="header-text">
      <h1>Yunseo Isabel Lee</h1>
      <p class="subtitle">한국학중앙연구원 인문정보학과 박사과정</p>
    </div>
  </div>

  <p class="section-title">Works</p>
  <a class="work" href="http://edu-omekas02.alab.kr/s/gitmu/page/about">'깃'든 '무'늬 아카이브</a>
  <a class="work" href="emuseum-facet.html">e뮤지엄 패싯 분류</a>
</body>
</html>
