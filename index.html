<div class="hero-slider">
  <img src="hero1.jpg" class="slide active" alt="">
  <img src="hero2.jpg" class="slide" alt="">
  <img src="hero3.jpg" class="slide" alt="">
</div>

<style>
.hero-slider {
  position: relative;
  width: 100%;
  height: 500px;        /* 원하는 높이로 조정 */
  overflow: hidden;
}
.hero-slider .slide {
  position: absolute;
  top: 0; left: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;    /* 잘리더라도 꽉 채움 */
  opacity: 0;
  transition: opacity 1s ease-in-out;
}
.hero-slider .slide.active {
  opacity: 1;
}
</style>

<script>
(function () {
  const slides = document.querySelectorAll('.hero-slider .slide');
  let current = 0;
  setInterval(() => {
    slides[current].classList.remove('active');
    current = (current + 1) % slides.length;
    slides[current].classList.add('active');
  }, 4000);   // 4초마다 전환
})();
</script>
